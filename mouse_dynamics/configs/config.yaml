# 数据配置
data:
  training_dir: "data/training_files"
  test_dir: "data/test_files"
  labels_file: "data/public_labels.csv"
  processed_dir: "data/processed"
  features_dir: "data/processed/features"
  predictions_dir: "data/predictions"

# 模型配置
model:
  name: "xgboost"
  params:
    n_estimators: 1000
    max_depth: 7
    learning_rate: 0.01
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 3
    gamma: 0.1
    objective: "binary:logistic"
    eval_metric: "auc"
    random_state: 42
  save_dir: "models"
  feature_importance_dir: "models/feature_importance"

# 特征工程配置
features:
  window_size: 100  # For time series features
  n_fft: 64  # For frequency domain features
  n_grid: 10  # For grid distribution features
  n_quadrants: 4  # For quadrant features
  n_pca_components: 5  # For PCA features
  overlap: 0.5
  min_points: 50
  grid_size: 10
  time_bins: 10
  frequency_bins: 10

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "mouse_dynamics.log"
  log_dir: "logs" 